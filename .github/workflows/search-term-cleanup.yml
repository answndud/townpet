name: search-term-cleanup

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Cleanup stale search terms
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEARCH_TERM_RETENTION_DAYS: "90"
        run: pnpm db:cleanup:search-terms

      - name: Cleanup stale search term daily metrics
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEARCH_TERM_DAILY_METRIC_RETENTION_DAYS: "90"
        run: pnpm db:cleanup:search-term-daily-metrics
