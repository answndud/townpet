name: docs-quality

on:
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - "business/**"
      - "scripts/refresh-docs-index.mjs"
      - "app/package.json"
      - "app/prisma/migrations/**"
      - "app/src/app/api/**"
      - ".github/workflows/docs-quality.yml"
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "business/**"
      - "scripts/refresh-docs-index.mjs"
      - "app/package.json"
      - "app/prisma/migrations/**"
      - "app/src/app/api/**"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Check docs index freshness
        run: node scripts/refresh-docs-index.mjs --check
